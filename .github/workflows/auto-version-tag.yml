name: Auto Version Tag

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  bump-and-tag:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(release): bump version') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump csproj version (patch)
        id: bump
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          csproj = Path("LanCopy.csproj")
          text = csproj.read_text(encoding="utf-8")

          m = re.search(r"<Version>(\d+)\.(\d+)\.(\d+)</Version>", text)
          if not m:
              raise SystemExit("Could not find <Version>x.y.z</Version> in LanCopy.csproj")

          major, minor, patch = map(int, m.groups())
          new_version = f"{major}.{minor}.{patch + 1}"

          text = re.sub(r"<Version>\d+\.\d+\.\d+</Version>", f"<Version>{new_version}</Version>", text)
          text = re.sub(r"<AssemblyVersion>\d+\.\d+\.\d+</AssemblyVersion>", f"<AssemblyVersion>{new_version}</AssemblyVersion>", text)
          text = re.sub(r"<FileVersion>\d+\.\d+\.\d+</FileVersion>", f"<FileVersion>{new_version}</FileVersion>", text)
          csproj.write_text(text, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={new_version}\n")
          PY

      - name: Commit bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LanCopy.csproj
          git commit -m "[skip ci] chore(release): bump version to ${{ steps.bump.outputs.version }}"

      - name: Create and push tag
        shell: bash
        run: |
          git tag -a "v${{ steps.bump.outputs.version }}" -m "LanCopy v${{ steps.bump.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.bump.outputs.version }}"
