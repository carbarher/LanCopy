name: Auto Version Tag

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip auto-bump commit
        shell: bash
        run: |
          msg="$(git log -1 --pretty=%s)"
          if [[ "$msg" == *"chore(release): bump version"* ]]; then
            echo "Auto-bump commit detected, skipping."
            exit 0
          fi

      - name: Bump csproj version (smart semver)
        id: bump
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          csproj = Path("LanCopy.csproj")
          text = csproj.read_text(encoding="utf-8")

          m = re.search(r"<Version>(\d+)\.(\d+)\.(\d+)</Version>", text)
          if not m:
              raise SystemExit("Could not find <Version>x.y.z</Version> in LanCopy.csproj")

          major, minor, patch = map(int, m.groups())

          def run_git(*args):
              return subprocess.check_output(["git", *args], text=True, encoding="utf-8").strip()

          # Default to patch; raise to minor/major based on commit messages since last tag.
          bump = "patch"
          try:
              last_tag = run_git("describe", "--tags", "--abbrev=0")
              log_range = f"{last_tag}..HEAD"
          except Exception:
              log_range = "HEAD"

          commits = run_git("log", log_range, "--pretty=%s%n%b<<<END>>>")
          tokens = commits.lower()
          if "breaking change" in tokens or re.search(r"\w+!:", commits):
              bump = "major"
          elif re.search(r"^feat(\(.+\))?:", commits, flags=re.IGNORECASE | re.MULTILINE):
              bump = "minor"

          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
 
          new_version = f"{major}.{minor}.{patch}"

          def tag_exists(tag_name: str) -> bool:
              result = subprocess.run(
                  ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag_name}"],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  text=True,
              )
              return result.returncode == 0

          # Ensure generated version tag does not already exist.
          while tag_exists(f"v{new_version}"):
              patch += 1
              new_version = f"{major}.{minor}.{patch}"

          text = re.sub(r"<Version>\d+\.\d+\.\d+</Version>", f"<Version>{new_version}</Version>", text)
          text = re.sub(r"<AssemblyVersion>\d+\.\d+\.\d+</AssemblyVersion>", f"<AssemblyVersion>{new_version}</AssemblyVersion>", text)
          text = re.sub(r"<FileVersion>\d+\.\d+\.\d+</FileVersion>", f"<FileVersion>{new_version}</FileVersion>", text)
          csproj.write_text(text, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={new_version}\n")
              fh.write(f"bump={bump}\n")
          PY

      - name: Commit bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LanCopy.csproj
          git commit -m "[skip ci] chore(release): bump ${{ steps.bump.outputs.bump }} version to ${{ steps.bump.outputs.version }}"

      - name: Create and push tag
        shell: bash
        run: |
          git tag -a "v${{ steps.bump.outputs.version }}" -m "LanCopy v${{ steps.bump.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.bump.outputs.version }}"
