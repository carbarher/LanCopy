name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore LanCopy.csproj
      - name: Build
        run: dotnet build LanCopy.csproj -c Release --no-restore

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore LanCopy.csproj
      - name: Test
        run: dotnet test tests/LanCopy.Tests/LanCopy.Tests.csproj -c Release

  performance-guard:
    name: Performance Guard (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore LanCopy.csproj
      - name: Build
        run: dotnet build LanCopy.csproj -c Release --no-restore
      - name: Throughput smoke benchmark
        shell: bash
        run: |
          start=$(date +%s)
          dotnet test tests/LanCopy.Tests/LanCopy.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~LanCopy.Tests.TransferIntegrationTests.Upload_Then_Download_PreservesContent"
          elapsed=$(( $(date +%s) - start ))
          echo "Smoke perf elapsed: ${elapsed}s"
          # Guardrail against severe regressions only (keep threshold generous to avoid flakiness).
          if [ "$elapsed" -gt 25 ]; then
            echo "Performance guard failed: elapsed ${elapsed}s > 25s"
            exit 1
          fi

  publish:
    name: Publish ${{ matrix.rid }}
    needs: [build, test, performance-guard]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'
      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish LanCopy.csproj -c Release -r ${{ matrix.rid }}
          --self-contained true -p:PublishSingleFile=true
          -o publish/${{ matrix.rid }}
      - name: Package Windows (single-file exe)
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: Copy-Item "publish/${{ matrix.rid }}/LanCopy.exe" "LanCopy-${{ matrix.rid }}.exe" -Force
      - name: Checksum Windows artifact
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: |
          $hash = (Get-FileHash "LanCopy-${{ matrix.rid }}.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -NoNewline "LanCopy-${{ matrix.rid }}.exe.sha256" $hash
      - name: Package Linux (tar.gz)
        if: startsWith(matrix.rid, 'linux-')
        run: |
          set -euo pipefail
          chmod +x publish/${{ matrix.rid }}/LanCopy
          mkdir -p pkg/usr/bin pkg/usr/share/applications pkg/usr/share/icons/hicolor/512x512/apps
          cp publish/${{ matrix.rid }}/LanCopy pkg/usr/bin/lancopy
          cp packaging/linux/lancopy.desktop pkg/usr/share/applications/lancopy.desktop
          cp Assets/app.png pkg/usr/share/icons/hicolor/512x512/apps/lancopy.png
          tar -C pkg -czf LanCopy-${{ matrix.rid }}.tar.gz .
          sha256sum LanCopy-${{ matrix.rid }}.tar.gz | awk '{print $1}' > LanCopy-${{ matrix.rid }}.tar.gz.sha256
          arch="amd64"
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then arch="arm64"; fi
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/applications deb/usr/share/icons/hicolor/512x512/apps
          cp publish/${{ matrix.rid }}/LanCopy deb/usr/bin/lancopy
          cp packaging/linux/lancopy.desktop deb/usr/share/applications/lancopy.desktop
          cp Assets/app.png deb/usr/share/icons/hicolor/512x512/apps/lancopy.png
          cat > deb/DEBIAN/control <<EOF
          Package: lancopy
          Version: ${GITHUB_REF_NAME#v}
          Section: net
          Priority: optional
          Architecture: $arch
          Maintainer: carbar
          Description: LAN file transfer app (encrypted, cross-platform)
          EOF
          dpkg-deb --build deb "LanCopy-${{ matrix.rid }}.deb"
          sha256sum "LanCopy-${{ matrix.rid }}.deb" | awk '{print $1}' > "LanCopy-${{ matrix.rid }}.deb.sha256"
      - name: Package Linux AppImage (x64)
        if: matrix.rid == 'linux-x64'
        run: |
          set -euo pipefail
          appdir="LanCopy.AppDir"
          rm -rf "$appdir"
          mkdir -p "$appdir/usr/bin" "$appdir/usr/share/applications" "$appdir/usr/share/icons/hicolor/512x512/apps"
          cp publish/linux-x64/LanCopy "$appdir/usr/bin/lancopy"
          cp packaging/linux/lancopy.desktop "$appdir/usr/share/applications/lancopy.desktop"
          cp Assets/app.png "$appdir/usr/share/icons/hicolor/512x512/apps/lancopy.png"
          cp packaging/linux/lancopy.desktop "$appdir/LanCopy.desktop"
          cp Assets/app.png "$appdir/lancopy.png"
          cat > "$appdir/AppRun" <<'EOF'
          #!/usr/bin/env bash
          exec "$APPDIR/usr/bin/lancopy" "$@"
          EOF
          chmod +x "$appdir/AppRun" "$appdir/usr/bin/lancopy"
          curl -fsSL -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 VERSION="${GITHUB_REF_NAME#v}" ./appimagetool.AppImage --appimage-extract-and-run "$appdir" "LanCopy-linux-x64.AppImage"
          sha256sum LanCopy-linux-x64.AppImage | awk '{print $1}' > LanCopy-linux-x64.AppImage.sha256
      - name: Package macOS (.app)
        if: startsWith(matrix.rid, 'osx-')
        run: |
          set -euo pipefail
          chmod +x packaging/macos/make-app.sh
          packaging/macos/make-app.sh publish/${{ matrix.rid }}/LanCopy "${{ github.ref_name }}"
          ditto -c -k --sequesterRsrc --keepParent LanCopy.app LanCopy-${{ matrix.rid }}.zip
          hdiutil create -volname "LanCopy" -srcfolder LanCopy.app -ov -format UDZO LanCopy-${{ matrix.rid }}.dmg
          shasum -a 256 LanCopy-${{ matrix.rid }}.zip | awk '{print $1}' > LanCopy-${{ matrix.rid }}.zip.sha256
          shasum -a 256 LanCopy-${{ matrix.rid }}.dmg | awk '{print $1}' > LanCopy-${{ matrix.rid }}.dmg.sha256
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: LanCopy-${{ matrix.rid }}
          path: |
            LanCopy-${{ matrix.rid }}.exe
            LanCopy-${{ matrix.rid }}.zip
            LanCopy-${{ matrix.rid }}.dmg
            LanCopy-${{ matrix.rid }}.tar.gz
            LanCopy-${{ matrix.rid }}.deb
            LanCopy-${{ matrix.rid }}.AppImage
            LanCopy-${{ matrix.rid }}.exe.sha256
            LanCopy-${{ matrix.rid }}.tar.gz.sha256
            LanCopy-${{ matrix.rid }}.deb.sha256
            LanCopy-${{ matrix.rid }}.AppImage.sha256
            LanCopy-${{ matrix.rid }}.zip.sha256
            LanCopy-${{ matrix.rid }}.dmg.sha256
          if-no-files-found: ignore

  installer:
    name: Windows installer
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download win-x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: LanCopy-win-x64
          path: dl/win-x64
      - name: Prepare installer input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path publish/win-x64 -Force | Out-Null
          Copy-Item dl/win-x64/LanCopy-win-x64.exe publish/win-x64/LanCopy.exe -Force
      # --- Firma de codigo (opcional) ---
      # Secretos: WINDOWS_CERT_BASE64 + WINDOWS_CERT_PASSWORD -> descomentar:
      # - name: Sign executable
      #   shell: pwsh
      #   run: |
      #     $pfx=[IO.Path]::Combine($env:RUNNER_TEMP,'cert.pfx')
      #     [IO.File]::WriteAllBytes($pfx,[Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
      #     signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 publish/win-x64/LanCopy.exe
      #   env:
      #     WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\LanCopy.iss
          $installer = Get-ChildItem -LiteralPath installer/Output -Filter "LanCopy-Setup-*.exe" | Sort-Object LastWriteTimeUtc | Select-Object -Last 1
          if (-not $installer) { throw "Installer was not created." }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = Join-Path $installer.DirectoryName "$($installer.Name).sha256"
          [IO.File]::WriteAllText($checksum, $hash, [Text.UTF8Encoding]::new($false))
          if (-not (Test-Path -LiteralPath $checksum)) { throw "Installer checksum was not created." }
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: LanCopy-Setup
          path: |
            installer/Output/*.exe
            installer/Output/*.sha256

  release:
    name: GitHub Release
    needs: [publish, installer]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true   # GitHub genera las notas solo
          files: |
            artifacts/LanCopy-win-x64/*
            artifacts/LanCopy-win-arm64/*
            artifacts/LanCopy-linux-x64/*
            artifacts/LanCopy-linux-arm64/*
            artifacts/LanCopy-osx-x64/*
            artifacts/LanCopy-osx-arm64/*
            artifacts/LanCopy-Setup/*