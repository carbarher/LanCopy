name: .NET

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "SlskDownAvalonia/**"
      - ".github/workflows/dotnet.yml"
  workflow_dispatch:

# Monorepo: el .slnx y los proyectos viven bajo SlskDownAvalonia/
# Si el repo es solo la carpeta del proyecto, usar working-directory: . y rutas sin prefijo SlskDownAvalonia/
defaults:
  run:
    working-directory: SlskDownAvalonia

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore SlskDownAvalonia.slnx

      - name: Build
        run: dotnet build SlskDownAvalonia.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SlskDownAvalonia.slnx -c Release --no-build --verbosity minimal
