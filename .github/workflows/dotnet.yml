# CI principal del monorepo p2p (submódulo SlskDownAvalonia + SlskDownBibliotecaImport en la raíz).
# No usar ci.yml legado con SlskDown.sln si ese archivo no está en el repo.
name: .NET

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "SlskDownAvalonia/**"
      - "SlskDownBibliotecaImport/**"
      - ".github/workflows/dotnet.yml"
  workflow_dispatch:

# SlskDownAvalonia referencia ../SlskDownBibliotecaImport (hermano en la raíz del repo).
defaults:
  run:
    working-directory: SlskDownAvalonia

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore SlskDownAvalonia.slnx

      - name: Build
        run: dotnet build SlskDownAvalonia.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SlskDownAvalonia.slnx -c Release --no-build --verbosity minimal
