name: .NET

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore SlskDownAvalonia/SlskDownAvalonia.csproj

      - name: Build
        run: dotnet build SlskDownAvalonia/SlskDownAvalonia.csproj -c Release --no-restore

      - name: Test
        run: dotnet test SlskDownAvalonia/SlskDownAvalonia.Tests.csproj -c Release --no-build
