name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore LanCopy.csproj

      - name: Build
        run: dotnet build LanCopy.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/LanCopy.Tests/LanCopy.Tests.csproj -c Release

  publish:
    name: Publish ${{ matrix.rid }}
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (${{ matrix.rid }}, self-contained, single file)
        run: >
          dotnet publish LanCopy.csproj -c Release -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanCopy-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

  installer:
    name: Windows installer
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: LanCopy-win-x64
          path: publish/win-x64

      # --- Firma de código (opcional) -------------------------------------------------
      # Para habilitarla, define los secretos del repositorio:
      #   WINDOWS_CERT_BASE64  -> el .pfx codificado en base64
      #   WINDOWS_CERT_PASSWORD-> la contraseña del .pfx
      # y descomenta el bloque siguiente.
      # - name: Sign executable
      #   if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
      #   shell: pwsh
      #   run: |
      #     $pfx = [IO.Path]::Combine($env:RUNNER_TEMP, 'cert.pfx')
      #     [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
      #     & signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 publish/win-x64/LanCopy.exe
      #   env:
      #     WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ github.ref_name }}
          installer\LanCopy.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LanCopy-Setup
          path: installer/Output/*.exe

  release:
    name: GitHub Release
    needs: [publish, installer]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*