<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 SlskDown Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
        }
        .glow-effect { animation: pulse-glow 2s infinite; }
        .status-online { background: linear-gradient(135deg, #10b981, #059669); }
        .status-offline { background: linear-gradient(135deg, #ef4444, #dc2626); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i data-lucide="music" class="w-8 h-8 text-blue-500"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-600 bg-clip-text text-transparent">
                        SlskDown Dashboard
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="connectionStatus" class="flex items-center space-x-2 px-3 py-1 rounded-full text-sm">
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <span>Conectado</span>
                    </div>
                    <button onclick="refreshData()" class="p-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <i data-lucide="search" class="w-8 h-8 text-blue-500"></i>
                    <span class="text-sm text-gray-400">Total</span>
                </div>
                <div class="text-3xl font-bold" id="totalSearches">0</div>
                <div class="text-sm text-gray-400 mt-1">Búsquedas realizadas</div>
            </div>

            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <i data-lucide="download" class="w-8 h-8 text-green-500"></i>
                    <span class="text-sm text-gray-400">Activas</span>
                </div>
                <div class="text-3xl font-bold" id="activeDownloads">0</div>
                <div class="text-sm text-gray-400 mt-1">Descargas en curso</div>
            </div>

            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <i data-lucide="hard-drive" class="w-8 h-8 text-purple-500"></i>
                    <span class="text-sm text-gray-400">Cache</span>
                </div>
                <div class="text-3xl font-bold" id="cacheSize">0 MB</div>
                <div class="text-sm text-gray-400 mt-1">Memoria utilizada</div>
            </div>

            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <div class="flex items-center justify-between mb-4">
                    <i data-lucide="users" class="w-8 h-8 text-orange-500"></i>
                    <span class="text-sm text-gray-400">Online</span>
                </div>
                <div class="text-3xl font-bold" id="onlineUsers">0</div>
                <div class="text-sm text-gray-400 mt-1">Usuarios conectados</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="lg:col-span-2">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i data-lucide="search" class="w-6 h-6 mr-2 text-blue-500"></i>
                        Búsqueda Rápida
                    </h2>
                    <div class="flex space-x-4">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Buscar música, artistas, álbumes..."
                            class="flex-1 px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                        >
                        <button 
                            onclick="performSearch()"
                            class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors flex items-center"
                        >
                            <i data-lucide="search" class="w-5 h-5 mr-2"></i>
                            Buscar
                        </button>
                    </div>
                    
                    <!-- Search Results -->
                    <div id="searchResults" class="mt-6 space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
            </div>

            <!-- Real-time Activity -->
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <i data-lucide="activity" class="w-6 h-6 mr-2 text-green-500"></i>
                    Actividad en Tiempo Real
                </h2>
                <div id="activityLog" class="space-y-2 max-h-96 overflow-y-auto text-sm">
                    <!-- Activity items will be added here -->
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <i data-lucide="bar-chart-2" class="w-6 h-6 mr-2 text-purple-500"></i>
                    Estadísticas de Descargas
                </h2>
                <canvas id="downloadsChart"></canvas>
            </div>

            <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <i data-lucide="pie-chart" class="w-6 h-6 mr-2 text-orange-500"></i>
                    Distribución por País
                </h2>
                <canvas id="countriesChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // WebSocket connection for real-time updates
        const ws = new WebSocket('ws://localhost:8080/ws');
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            updateRealTimeData(data);
        };

        // Chart configurations
        const downloadsCtx = document.getElementById('downloadsChart').getContext('2d');
        const downloadsChart = new Chart(downloadsCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Descargas por Hora',
                    data: [],
                    borderColor: 'rgb(59, 130, 246)',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        const countriesCtx = document.getElementById('countriesChart').getContext('2d');
        const countriesChart = new Chart(countriesCtx, {
            type: 'doughnut',
            data: {
                labels: ['US', 'ES', 'MX', 'AR', 'OTROS'],
                datasets: [{
                    data: [30, 25, 20, 15, 10],
                    backgroundColor: [
                        'rgb(59, 130, 246)',
                        'rgb(16, 185, 129)',
                        'rgb(251, 146, 60)',
                        'rgb(147, 51, 234)',
                        'rgb(107, 114, 128)'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Functions
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const response = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: query,
                    max_results: 20
                })
            });

            const data = await response.json();
            displaySearchResults(data.results);
            
            // Add to activity log
            addActivityItem(`🔍 Búsqueda: "${query}" - ${data.total} resultados`);
        }

        function displaySearchResults(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = results.map(item => `
                <div class="flex items-center justify-between p-3 bg-gray-700 rounded-lg hover:bg-gray-600 transition-colors">
                    <div class="flex items-center space-x-3">
                        <i data-lucide="music" class="w-4 h-4 text-blue-400"></i>
                        <div>
                            <div class="font-medium">${item.filename}</div>
                            <div class="text-sm text-gray-400">${item.username} • ${item.country} • ${formatSize(item.size)}</div>
                        </div>
                    </div>
                    <button class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm transition-colors">
                        Descargar
                    </button>
                </div>
            `).join('');
            
            // Re-initialize icons for new content
            lucide.createIcons();
        }

        function updateRealTimeData(data) {
            document.getElementById('cacheSize').textContent = `${Math.round(data.cache_size / 1024 / 1024)} MB`;
            document.getElementById('activeDownloads').textContent = data.concurrent;
            
            // Update connection status
            const status = document.getElementById('connectionStatus');
            status.className = 'flex items-center space-x-2 px-3 py-1 rounded-full text-sm status-online';
        }

        function addActivityItem(message) {
            const log = document.getElementById('activityLog');
            const item = document.createElement('div');
            item.className = 'p-2 bg-gray-700 rounded text-gray-300';
            item.innerHTML = `
                <span class="text-gray-500">${new Date().toLocaleTimeString()}</span>
                <span class="ml-2">${message}</span>
            `;
            log.insertBefore(item, log.firstChild);
            
            // Keep only last 10 items
            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }

        function formatSize(bytes) {
            const sizes = ['B', 'KB', 'MB', 'GB'];
            if (bytes === 0) return '0 B';
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
        }

        function refreshData() {
            location.reload();
        }

        // Initialize with sample data
        document.getElementById('totalSearches').textContent = '1,247';
        document.getElementById('activeDownloads').textContent = '3';
        document.getElementById('cacheSize').textContent = '45 MB';
        document.getElementById('onlineUsers').textContent = '23,456';

        // Add initial activity
        addActivityItem('🚀 Dashboard iniciado');
        addActivityItem('📊 Estadísticas cargadas');
        addActivityItem('🔗 Conectado al backend');
    </script>
</body>
</html>
