# Configuración aMule para SlskDown
# Copiar este contenido a: %USERPROFILE%\.aMule\amule.conf

[ExternalConnect]
AcceptExternalConnections=1
ECPassword=
ECPort=4712

[eMule]
Nick=SlskDown-User
MaxUpload=100
MaxDownload=0

[Server]
AutoConnect=1
AutoConnectStaticOnly=0

[GUI]
HideOnClose=1

[WebServer]
Enabled=0
